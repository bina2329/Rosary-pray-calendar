<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9일 묵주기도 트래커</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>9일 묵주기도 트래커</h1>
        
        <section class="settings">
            <h2>기본 설정</h2>
            <div class="setting-group">
                <h3>알람 설정</h3>
                <div class="alarm-control">
                    <input type="time" id="alarmTime">
                    <button id="setAlarm">알람 설정</button>
                    <button id="testNotification">알림 테스트</button>
                </div>
                <p id="alarmStatus">알람이 설정되지 않았습니다.</p>
            </div>
            <hr>
            <div class="setting-group">
                <h3>기도 시작 날짜</h3>
                <div class="date-control">
                    <input type="date" id="startDate">
                    <button id="setStartDate">날짜 설정</button>
                </div>
            </div>
        </section>

        <section class="novena-list">
            <h2>기도 일정 (9일)</h2>
            <div id="daysGrid" class="grid">
                <!-- Days will be generated by JS -->
            </div>
            <button id="resetProgress" class="reset-btn">진행 상황 초기화</button>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
