<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>묵주기도달력</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="auth-section">
            <div id="userProfile" class="hidden">
                <span id="userName"></span>님
                <button id="logoutBtn" class="small-btn">로그아웃</button>
            </div>
            <button id="loginBtn" class="small-btn">구글 로그인</button>
        </div>
        <h1>묵주기도달력</h1>
        
        <section class="settings">
            <h2>기본 설정</h2>
            <div class="setting-group">
                <h3>알람 설정</h3>
                <div class="alarm-control">
                    <input type="time" id="alarmTime">
                    <button id="setAlarm">알람 설정</button>
                    <button id="clearAlarm" class="small-btn">알람 해제</button>
                    <button id="testNotification">알림 테스트</button>
                </div>
                <p id="alarmStatus">알람이 설정되지 않았습니다.</p>
            </div>
            <hr>
            <div class="setting-group">
                <h3>기도 기간 및 시작 날짜</h3>
                <div class="duration-control">
                    <label for="prayerDuration">기도 기간(일): </label>
                    <input type="number" id="prayerDuration" min="1" value="9">
                </div>
                <div class="date-control">
                    <input type="date" id="startDate">
                    <button id="setSettings">설정 저장</button>
                </div>
            </div>
        </section>

        <section class="novena-list">
            <div class="view-header">
                <h2 id="listTitle">기도 일정</h2>
                <div class="view-toggle">
                    <button id="listViewBtn" class="active">목록 보기</button>
                    <button id="calendarViewBtn">달력 보기</button>
                </div>
            </div>
            
            <div id="listView">
                <div id="daysGrid" class="grid">
                    <!-- Days will be generated by JS -->
                </div>
            </div>

            <div id="calendarView" class="hidden">
                <div class="calendar-header">
                    <span id="calendarMonth"></span>
                </div>
                <div class="calendar-days-header">
                    <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
                </div>
                <div id="calendarGrid" class="calendar-grid">
                    <!-- Calendar will be generated by JS -->
                </div>
            </div>

            <button id="resetProgress" class="reset-btn">진행 상황 초기화</button>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
